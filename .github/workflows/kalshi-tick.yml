name: Kalshi Odds Tick

# HO 218: refresh per-seat Kalshi prediction-market odds for the race card.
# Vercel Hobby caps cron at once daily, so the schedule lives here and hits the
# regular HTTP endpoint (same pattern as markets-tick.yml). CRON_SECRET must be
# set as a repo secret with the same value as Vercel's CRON_SECRET env var.
#
# Election odds move far slower than stock prices, so every 2 hours is plenty
# intraday-fresh; the route's full-feed scan is heavier than a quote fetch, so
# this stays lighter than the 30-min markets tick.
on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Kalshi odds endpoint
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://congressional-terminal-chi-silk.vercel.app/api/cron/kalshi"
