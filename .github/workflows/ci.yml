# HO 488 — secretless CI. Catches the class of failure that shipped at 3ed533c
# (broken `npm run typecheck` undetected until the next session). No DB creds:
# `next build` was verified to prerender cleanly without TURSO_* / GEMINI_API_KEY
# (every DB-backed route is dynamic), so no `env:` block and no secrets here.
name: CI

on:
  # Skip docs-only commits — they can't meaningfully fail typecheck+build.
  # paths-ignore (a blocklist), NOT paths (an allowlist): a blocklist fails
  # safe. An allowlist would silently skip CI the first time someone adds a
  # path that isn't on it. scripts/** and e2e/** are deliberately NOT ignored
  # (they're TypeScript, covered by typecheck — scripts/ is exactly what broke
  # at 3ed533c); .github/** stays unignored so workflow edits still run CI.
  #
  # paths-ignore + required status checks do not mix: if branch protection
  # is ever enabled, PRs touching only ignored paths never report this
  # check and block indefinitely. Fix then is a companion job that reports
  # success for ignored paths — not removing the filter.
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**/*.md'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**/*.md'
      - 'LICENSE'

# A rapid re-push cancels the in-flight run for the same ref instead of queuing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # No `engines` pin in package.json; 20 LTS per HO 488 fallback.
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
