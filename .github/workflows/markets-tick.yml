name: Markets Tick (intraday)

# HO 142 / HO 172: refresh the markets ticker every 30 min during US market
# hours. Vercel Hobby caps cron at once daily, so the schedule lives here and
# hits the regular HTTP endpoint. CRON_SECRET must be set as a repo secret with
# the same value as Vercel's CRON_SECRET env var.
#
# HO 172: widened 14-20 → 13-21 UTC so it covers 9:30am-4pm ET in BOTH DST
# regimes (ET = UTC-4 summer / UTC-5 winter); the old 14-20 missed 9:30-10am in
# summer and 3-4pm in winter.
#
# HO 227: Stooq died, so the intraday source is now FMP (the indices SPX/NDQ/DOW).
# `?source=fmp` fetches only those; the FRED symbols (rates/VIX/commodities) are
# end-of-day and handled by the daily after-close run (markets-daily.yml). The
# schedule is unchanged. NOTE: `curl -fsS` fails the step on the route's HTTP 500,
# which the route now returns when ALL fetches fail (HO 227 failure-honesty) — so
# a total FMP outage turns this Action red instead of silently 404-rotting.
on:
  schedule:
    - cron: '0,30 13-21 * * 1-5'
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Hit markets endpoint (FMP indices)
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://congressional-terminal-chi-silk.vercel.app/api/cron/markets?source=fmp"
