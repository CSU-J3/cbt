<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT — dashboard (B)</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
:root{
  --bg-base:#0a0e14; --bg-panel:#050709; --bg-row-hover:#0f1620;
  --border-strong:#1f2937; --border-soft:#111820;
  --text-primary:#e5e7eb; --text-secondary:#cbd5e1; --text-muted:#94a3b8; --text-dim:#6b7280;
  --accent-amber:#d97706; --accent-amber-bright:#fbbf24; --ticker-closed:#9b3d3d;
  --stage-intro:#94a3b8; --stage-committee:#06b6d4; --stage-floor:#fbbf24; --stage-other:#f59e0b; --stage-president:#fb923c; --stage-enacted:#10b981;
  --party-rep:#ef4444; --party-dem:#3b82f6; --party-ind:#a78bfa;
  --rail-house:#06b6d4; --rail-senate:#a78bfa; --pos:#10b981; --neg:#ef4444;
  --mono: ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Consolas,monospace;
  --sans: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg-base);color:var(--text-primary)}
body{font-family:var(--mono);font-size:13px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1700px;margin:0 auto}

.header{border-bottom:1px solid var(--border-strong)}
.mast{padding:16px 22px 13px}
.mast-line{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.brand{font-family:var(--mono);font-size:20px;color:var(--text-primary);white-space:nowrap;word-spacing:-6px}
.brand .g{color:var(--accent-amber)}
.readout{font-family:var(--mono);font-size:14px;color:var(--text-dim)} .readout b{font-weight:600}
.readout .total{color:var(--party-dem)} .readout .cmte{color:var(--party-rep)} .readout .floor{color:var(--accent-amber-bright)} .readout .other{color:var(--stage-other)} .readout .enac{color:var(--stage-enacted)}
.cur{color:var(--accent-amber);animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.sync{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap}
/* two tapes: MARKETS close (CLOSED state), SIGNALS never close */
.tape{display:flex;align-items:center;flex-wrap:wrap;gap:0 20px;padding:8px 22px;background:var(--bg-panel);border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-dim)}
.tape .lbl{font-size:9px;letter-spacing:.14em;color:var(--text-dim);margin-right:4px}
.tape .tk{white-space:nowrap} .tape .tk .v{color:var(--text-secondary)} .tape .up{color:var(--pos)} .tape .down{color:var(--neg)}
.tape .st{margin-left:auto;font-size:9px;letter-spacing:.08em;color:var(--text-dim);white-space:nowrap}
.tape .st .closed{color:var(--ticker-closed)}
.tape .st .live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--stage-enacted);margin-right:5px;vertical-align:0}
.nav{display:flex;flex-wrap:wrap;align-items:center;padding:11px 22px;background:var(--bg-panel);border-top:1px solid var(--border-soft);font-size:14px}
.nav a{color:var(--text-dim);text-decoration:none;padding:0 11px} .nav a.active{color:var(--accent-amber-bright)} .nav .dv{color:var(--border-strong);padding:0 8px}
.weekly{display:flex;flex-wrap:wrap;align-items:center;margin:14px 22px 0;padding:11px 2px;border-top:1px solid var(--border-strong);font-size:11px;color:var(--text-muted)}
.weekly .wk{color:var(--accent-amber)} .weekly .sep{color:var(--border-strong);margin:0 13px} .weekly .en{color:var(--stage-enacted)} .weekly .bid{color:var(--accent-amber)} .weekly .arr{color:var(--text-dim)} .weekly .more{color:var(--text-dim);margin-left:auto} .weekly .wk-d{color:var(--text-dim);font-size:.85em;margin-left:4px}
.weekly .wk-metric{position:relative;cursor:default}
.weekly .wk-pop{position:absolute;top:calc(100% + 8px);left:0;display:none;z-index:40;background:var(--bg-panel);border:1px solid var(--accent-amber);border-radius:3px;padding:9px 11px;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.55)}
.weekly .wk-metric:hover .wk-pop{display:block}
.weekly .wk-pop .h{display:block;color:var(--text-dim);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.weekly .wk-pop .d{display:block;color:var(--text-dim);font-size:9px;white-space:normal;max-width:210px;line-height:1.45;margin-bottom:7px}
.weekly .wk-pop .r{display:flex;justify-content:space-between;gap:24px;font-size:10.5px;color:var(--text-secondary);line-height:1.75}
.weekly .wk-pop .r .v{color:var(--text-primary)}
.weekly .wk-pop .r.dl{border-top:1px solid var(--border-soft);margin-top:4px;padding-top:5px} .weekly .wk-pop .r.dl .v{color:var(--text-dim)}

.fullrow{margin:18px 22px 0}
.body2{display:flex;gap:16px;margin:16px 22px 0;align-items:flex-start}
.col-l{flex:0 0 49%;display:flex;flex-direction:column;gap:16px}
.col-r{flex:1 1 auto;display:flex;flex-direction:column;gap:16px}

.panel{border:1px solid var(--border-strong);border-radius:3px;background:var(--bg-panel)}

/* races */
.races-tabs,.feed-tabs,.dtabs{display:flex;align-items:center;gap:26px;padding:11px 16px 0;font-size:12px}
.rtab,.ftab,.dtab{color:var(--text-dim);cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent;letter-spacing:.04em}
.rtab .ct,.ftab .ct{color:var(--text-dim)} .rtab.active,.ftab.active,.dtab.active{color:var(--text-primary);border-bottom-color:var(--accent-amber)}
.races-body{padding:18px 16px 16px}
.ctl-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 8px 8px}
.ctl-legend{font-size:9.5px;color:var(--text-dim)}
.ctl-legend .sw{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--text-secondary);vertical-align:-1px;margin:0 4px 0 10px}
.ctl-legend .sw.sq{border-radius:2px} .ctl-legend .sw.sm{width:2px;height:9px;border-radius:0;background:var(--text-dim);margin-left:14px;vertical-align:0}
.ctl{position:relative;height:74px;margin:0 8px 22px;border-bottom:1px solid var(--border-soft)}
.ctl-track{position:absolute;left:0;right:0;top:25px;height:4px;border-radius:2px;background:linear-gradient(90deg,rgba(59,130,246,.5),rgba(100,116,139,.22) 50%,rgba(239,68,68,.5))}
.ctl-axis{position:absolute;left:0;right:0;top:58px;font-size:8.5px;letter-spacing:.07em;color:var(--text-dim)} .ctl-axis span{position:absolute}
.ctl-eday{font-size:9.5px;color:var(--text-dim);text-align:right} .ctl-eday .t{color:var(--accent-amber-bright);font-weight:600;letter-spacing:.05em} .ctl-eday .cd{color:var(--accent-amber)}
.cm{position:absolute;top:0;bottom:0;transform:translateX(-50%);width:86px;text-align:center;z-index:2;pointer-events:none}
.cm .dot,.cm .lbl,.cm .tick,.cm .cnt,.cm .dt{pointer-events:auto}
.cm .lbl{position:absolute;top:0;left:0;right:0;font-size:10px;line-height:1;white-space:nowrap}
.cm .lbl .more{color:var(--text-dim);font-weight:400}
.cm .dot{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;border:2px solid var(--bg-panel)}
.cm .tick{position:absolute;top:21px;left:50%;transform:translateX(-50%);width:2px;height:12px;background:var(--text-dim)}
.cm .cnt{position:absolute;top:41px;left:0;right:0;font-size:10px;color:var(--text-muted);line-height:1;white-space:nowrap}
.cm .dt{position:absolute;top:57px;left:0;right:0;font-size:9px;color:var(--text-dim)}
.cm.dem .lbl{color:var(--party-dem);font-weight:600} .cm.dem .dot{background:var(--party-dem)}
.cm.rep .lbl{color:var(--party-rep);font-weight:600} .cm.rep .dot{background:var(--party-rep)}
.cm.hou .dot{border-radius:2px}
.cm.agg:hover .tick{background:var(--text-secondary)} .cm.agg:hover .cnt{color:var(--text-secondary)}
.cm-pop{position:absolute;left:50%;bottom:48px;transform:translateX(-50%);min-width:158px;background:var(--bg-panel);border:1px solid var(--border-strong);border-radius:3px;padding:8px 10px 6px;display:none;z-index:50;text-align:left;box-shadow:0 8px 22px rgba(0,0,0,.55);pointer-events:auto}
.cm.agg:hover .cm-pop{display:block}
.cm-pop::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border-strong)}
.cm-pop .ph{font-size:9px;color:var(--text-dim);margin-bottom:6px;white-space:nowrap}
.cm-pop .pr{display:flex;align-items:center;gap:7px;font-size:10px;white-space:nowrap;padding:2px 0}
.cm-pop .pr .pd{width:6px;height:6px;border-radius:50%;flex:none} .cm-pop .pr .pd.hou{border-radius:1px}
.cm-pop .pr .pd.dem{background:var(--party-dem)} .cm-pop .pr .pd.rep{background:var(--party-rep)}
.cm-pop .pr .seat{color:var(--text-secondary)} .cm-pop .pr .rt{margin-left:auto;padding-left:14px;color:var(--text-dim)}
.cm-pop .pr .rt.tu{color:var(--accent-amber-bright)} .cm-pop .pr .rt.d{color:var(--party-dem)} .cm-pop .pr .rt.r{color:var(--party-rep)}
.cm.hl .dot{transform:translateX(-50%) scale(1.3);box-shadow:0 0 0 3px rgba(251,191,36,.3)}
.cm.hl .lbl{color:var(--accent-amber-bright)} .cm.hl .dt{color:var(--text-secondary)}
.cfinish{position:absolute;right:0;top:3px;height:48px;border-right:2px solid var(--accent-amber-bright);padding-right:9px;text-align:right;display:flex;flex-direction:column;gap:3px;z-index:2}
.cfinish .t{font-size:10px;color:var(--accent-amber-bright);font-weight:600} .cfinish .d{font-size:9px;color:var(--text-dim)} .cfinish .cd{font-size:9px;color:var(--accent-amber)}
.race-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.race-card{border:1px solid var(--border-strong);border-radius:3px;padding:14px;background:var(--bg-base);display:flex;flex-direction:column}
.race-card.hot{border-color:var(--accent-amber)} .race-card.hl{border-color:var(--accent-amber-bright);box-shadow:0 0 0 1px var(--accent-amber-bright)}
.rc-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.rc-seat{font-size:11px;color:var(--text-dim);letter-spacing:.07em}
.rc-margin{font-size:10px;color:var(--text-dim)} .rc-margin .v{font-weight:600} .rc-margin .d{color:var(--party-dem)} .rc-margin .r{color:var(--party-rep)}
.rc-inc{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rc-inc .dot8{width:8px;height:8px;border-radius:50%;flex:none} .rc-inc .dem{background:var(--party-dem)} .rc-inc .rep{background:var(--party-rep)}
.rc-inc .nm{font-family:var(--sans);font-size:14px;color:var(--text-primary)}
.rc-inc .tag{margin-left:auto;font-size:8.5px;color:var(--text-dim);border:1px solid var(--border-strong);border-radius:2px;padding:2px 5px}
.rc-sub{font-size:10px;color:var(--text-dim);margin-bottom:14px;padding-left:16px}
.sb-wrap{margin-bottom:9px} .sb-ends{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-bottom:4px}
.sb{position:relative;height:16px}
.sb-track{position:absolute;left:0;right:0;top:6px;height:4px;border-radius:2px;background:linear-gradient(90deg,rgba(59,130,246,.5),rgba(100,116,139,.25) 50%,rgba(239,68,68,.5))}
.sb-cent{position:absolute;left:50%;top:3px;width:1px;height:10px;background:var(--border-strong)}
.sb-band{position:absolute;top:5px;height:6px;background:rgba(229,231,235,.16);border-radius:3px}
.sb-rater{position:absolute;top:4px;width:8px;height:8px;border-radius:50%;background:var(--text-secondary);border:1.5px solid var(--bg-base);transform:translateX(-50%)}
.sb-mkt{position:absolute;top:-2px;transform:translateX(-50%);color:var(--accent-amber-bright);font-size:12px;line-height:1}
.rc-raters{font-size:10px;color:var(--text-dim);margin-bottom:12px;line-height:1.6}
.rc-raters .ld{color:var(--party-dem)} .rc-raters .tu{color:var(--accent-amber-bright)} .rc-raters .lr{color:var(--party-rep)}
.rc-diverge{display:inline-block;font-size:8.5px;color:var(--accent-amber-bright);border:1px solid var(--accent-amber);border-radius:2px;padding:1px 5px;margin-top:5px}
.rc-stats{display:flex;gap:14px;border-top:1px solid var(--border-soft);padding-top:11px;margin-top:auto}
.rc-stat{flex:1} .rc-stat .k{font-size:8.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px} .rc-stat .v{font-size:12px;color:var(--text-secondary)} .rc-stat .v.d{color:var(--party-dem)} .rc-stat .v.r{color:var(--party-rep)} .rc-stat .v.dim{color:var(--text-dim)}

/* breaking box */
.brk-head{display:flex;align-items:baseline;justify-content:space-between;padding:13px 16px 10px}
.brk-head .h{font-size:11px;letter-spacing:.1em;color:var(--accent-amber-bright)}
.brk-head .ct{color:var(--text-dim);font-size:11px}
.brk-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:9px 16px;border-top:1px solid var(--border-soft);border-left:2px solid var(--accent-amber);background:linear-gradient(90deg,rgba(217,119,6,.05),transparent 40%)}
.brk-row .bid{font-size:11px;color:var(--accent-amber);border:1px solid var(--border-strong);border-radius:2px;padding:2px 7px;white-space:nowrap}
.brk-row .bh{font-family:var(--sans);font-size:12.5px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brk-row .ba{font-size:10px;color:var(--text-dim)}
.brk-foot{text-align:center;font-size:10.5px;color:var(--text-dim);letter-spacing:.06em;padding:10px 0;border-top:1px solid var(--border-soft);cursor:pointer} .brk-foot:hover{color:var(--accent-amber-bright)}

/* dist tabbed — compact fixed height */
.dbody{height:230px;display:flex;flex-direction:column}
.dpane{display:none;flex:1;flex-direction:column;min-height:0} .dpane.active{display:flex}
.bars{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between}
.brow{display:grid;grid-template-columns:90px 1fr 56px;align-items:center;gap:10px}
.brow .bl{font-size:11px;color:var(--text-secondary)} .btrack{height:18px;position:relative}
.bfill{position:absolute;left:0;top:0;bottom:0;border-radius:2px;min-width:6px} .brow .bv{font-size:12px;color:var(--text-primary);text-align:right}
.tm{flex:1;display:flex;min-height:0;padding:12px} .tm svg{display:block;width:100%;height:100%}
.cell-label{font-family:var(--mono);pointer-events:none} .cell-name{font-weight:700} .cell-val{opacity:.85}

/* feed */
.fgroup{border-top:1px solid var(--border-soft)}
.frow{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:13px;padding:9px 16px;cursor:pointer}
.frow:hover{background:var(--bg-row-hover)}
.fid{font-size:11px;color:var(--accent-amber);border:1px solid var(--border-strong);border-radius:2px;padding:2px 7px;white-space:nowrap}
.fid.house{border-color:var(--rail-house)} .fid.senate{border-color:var(--rail-senate)}
.ftitle{font-family:var(--sans);font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmetric{font-size:10.5px;color:var(--text-muted);white-space:nowrap} .fmetric .ar{color:var(--text-dim)}
.fchev{color:var(--text-dim);font-size:10px} .fgroup.open .fchev{color:var(--accent-amber)}
.fexp{display:none;padding:4px 16px 16px;background:var(--bg-row-hover);border-top:1px solid var(--border-soft)} .fgroup.open .fexp{display:block}
.fe-topics{font-size:9px;color:var(--text-dim);letter-spacing:.06em;padding:10px 0 12px} .fe-topics .tp{color:var(--text-muted)} .fe-topics .tp-sep{color:var(--border-strong);margin:0 7px}
.fe-grid{display:grid;grid-template-columns:1fr 210px;gap:18px}
.pipe{display:flex;align-items:center;margin-bottom:13px}
.pipe .pn{width:11px;height:11px;border-radius:50%;flex:none;border:2px solid var(--bg-row-hover)} .pipe .pc{flex:1;height:2px}
.pipe .pcd{background:var(--stage-enacted)} .pipe .pct{background:var(--border-strong)} .pipe .cur{background:var(--stage-floor);box-shadow:0 0 0 3px rgba(251,191,36,.2)} .pipe .todo{background:var(--border-strong)}
.fe-summary{font-family:var(--sans);font-size:12.5px;line-height:1.55;color:var(--text-secondary);margin-bottom:14px}
.fe-news{border-top:1px solid var(--border-soft);padding-top:11px} .fe-news .nh{font-size:9px;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px}
.fe-news .ni{font-family:var(--sans);font-size:11.5px;color:var(--text-secondary);margin-bottom:7px;display:flex;gap:8px} .fe-news .ni .src{font-family:var(--mono);font-size:9px;color:var(--text-dim);flex:none;padding-top:2px}
.fe-side .sk{font-size:9px;color:var(--text-dim);margin:0 0 3px} .fe-side .sv{font-family:var(--sans);font-size:12px;color:var(--text-secondary);margin-bottom:12px} .fe-side .sv.mono{font-family:var(--mono);font-size:11px}
.fe-btns{display:flex;gap:8px;margin-top:6px} .fe-btns a{font-size:10px;color:var(--text-secondary);border:1px solid var(--border-strong);border-radius:2px;padding:6px 10px;text-decoration:none}
.fe-btns a:hover{border-color:var(--accent-amber);color:var(--accent-amber-bright)}
.feed-foot{text-align:center;font-size:10.5px;color:var(--text-dim);letter-spacing:.06em;padding:11px 0;border-top:1px solid var(--border-soft);cursor:pointer} .feed-foot:hover{color:var(--accent-amber-bright)}
.footer{height:50px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="mast">
      <div class="mast-line">
        <span class="brand">Congressional Terminal<span class="g">:\</span>119TH<span class="g">\</span>Dashboard<span class="g">></span></span>
        <span class="readout"><b class="total">16,290</b> bills tracked · <b class="cmte">14,616</b> in committee · <b class="floor">755</b> on the floor · <b class="other">54</b> other chamber · <b class="enac">92</b> enacted<span class="cur">_</span></span>
      </div>
      <div class="sync">LAST SYNC 4:05 AM ET</div>
    </div>
    <div class="tape" data-tape-mkt></div>
    <div class="tape" data-tape-odds></div>
    <div class="nav" data-nav></div>
  </div>

  <div class="fullrow"><div class="panel" data-races></div></div>

  <div class="weekly" data-weekly></div>

  <div class="body2">
    <div class="col-l">
      <div class="panel" data-breaking></div>
      <div class="panel" data-dist></div>
    </div>
    <div class="col-r"><div class="panel" data-feed></div></div>
  </div>

  <div class="footer"></div>
</div>

<script>
const tapeMktHTML=`<span class="lbl">MARKETS</span><span class="tk">S&P 500 <span class="v">5,431</span> <span class="up">▲0.4%</span></span><span class="tk">NASDAQ <span class="v">17,688</span> <span class="up">▲0.6%</span></span><span class="tk">10Y <span class="v">4.21%</span> <span class="down">▼0.02</span></span><span class="tk">WTI <span class="v">$78.40</span> <span class="up">▲1.1%</span></span><span class="st">AS OF 4:43 PM ET · <span class="closed">CLOSED</span></span>`;

const luminance=hex=>{const c=hex.replace('#','');const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);return (0.299*r+0.587*g+0.114*b)/255;};

function drawTreemap(sel,data,W,H){const svg=d3.select(sel).attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','none');svg.selectAll('*').remove();const root=d3.hierarchy({children:data}).sum(d=>d.v).sort((a,b)=>b.value-a.value);d3.treemap().tile(d3.treemapSquarify).size([W,H]).paddingInner(2)(root);const g=svg.selectAll('g').data(root.leaves()).join('g').attr('transform',d=>`translate(${d.x0},${d.y0})`);g.append('rect').attr('width',d=>Math.max(0,d.x1-d.x0)).attr('height',d=>Math.max(0,d.y1-d.y0)).attr('fill',d=>d.data.c);g.each(function(d){const w=d.x1-d.x0,h=d.y1-d.y0;if(w<38||h<26)return;const t=textOn(d.data.c);const node=d3.select(this);node.append('text').attr('class','cell-label cell-name').attr('x',8).attr('y',18).attr('fill',t).attr('font-size',13).text(d.data.n);if(h>40)node.append('text').attr('class','cell-label cell-val').attr('x',8).attr('y',34).attr('fill',t).attr('font-size',12).text(d.data.v.toLocaleString());});}
function drawBars(sel){const maxv=Math.max(...stages.map(s=>s.v));const order=['INTRO','COMMITTEE','FLOOR','OTHER','PRESIDENT','ENACTED'];const byName=Object.fromEntries(stages.map(s=>[s.n,s]));const host=document.querySelector(sel);host.innerHTML='';order.forEach(name=>{const s=byName[name];const pct=s.v>0?Math.sqrt(s.v)/Math.sqrt(maxv)*100:0;const row=document.createElement('div');row.className='brow';row.innerHTML=`<div class="bl">${name}</div><div class="btrack"><div class="bfill" style="width:${pct}%;background:${s.c}"></div></div><div class="bv">${s.v.toLocaleString()}</div>`;host.appendChild(row);});}

});
